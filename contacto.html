<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Contacto">
    <meta property="og:description" content="Página de contacto de la web del instituto IES El Caminás">
    <meta property="og:image" content="/images/hero.jpg">
    <link rel="icon" href="/images/favicon-32x32.png" type="image/png" sizes="32x32">

    <link rel="apple-touch-icon" href="/images/favicon-180x180.png">

</head>

<body>
    <header class="encabezado">
        <h1>Contacto</h1>
    </header>

    <nav>
        <ul class="menu">
            <li><a href="/index.html">Inicio</a></li>
            <li><a href="/estudios.html">Nuestra Oferta Educativa</a></li>
            <li><a href="/contacto.html">Contacto</a></li>
        </ul>
    </nav>
    <main>
        <h2>Formulario de Matriculación</h2>
        <form action="https://caminas.com" method="post">
            <fieldset>
                <legend>Datos personales</legend>

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre">

                <label for="email">Email</label>
                <input type="email" id="email">

                <label for="fecha">Fecha nacimiento</label>
                <input type="date" id="fecha">
            </fieldset>

            <fieldset>
                <legend>Curso</legend>

                <label for="curso">Curso</label>
                <select id="curso">
                    <option>SMX</option>
                    <option>DAW</option>
                    <option>DAM</option>
                    <option>ASIX</option>
                </select>
            </fieldset>

            <label>
                <input type="checkbox" required>
                Acepto la política de privacidad
            </label>

            <button type="submit">Enviar</button>
        </form>
    </main>
    <footer class="pie-pagina">

    </footer>
</body>
